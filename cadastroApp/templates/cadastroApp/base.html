<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Cadastro{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

    <header>
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">☰</button>
        <h2>Simulado</h2>
        <nav>
            <span id="userChip">Olá, Usuário!</span>
        </nav>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <ul>
                <li><a href="{% url 'index' %}">Início</a></li>
                <li><a href="{% url 'dashboard_colaborador' %}">Dashboard | Colaboradores</a></li>
                <li><a href="{% url 'dashboard_maquinas' %}">Dashboard | Máquinas</a></li>
            </ul>
        </aside>

        <!-- Overlay mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="container">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <script>
        /* =========================================================
           SIDEBAR MOBILE TOGGLE
           ========================================================= */
        const sidebar        = document.getElementById('sidebar');
        const menuToggle     = document.getElementById('menuToggle');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.style.display = 'block';
            menuToggle.textContent = '✕';
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.style.display = 'none';
            menuToggle.textContent = '☰';
        }

        menuToggle.addEventListener('click', () => {
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });

        sidebarOverlay.addEventListener('click', closeSidebar);

        /* =========================================================
           ACTIVE LINK DETECTION
           ========================================================= */
        (function markActiveLink() {
            const currentPath = window.location.pathname;
            const links = document.querySelectorAll('.sidebar a');

            links.forEach(link => {
                const linkPath = link.getAttribute('href');
                if (currentPath === linkPath ||
                    (linkPath !== '/' && currentPath.startsWith(linkPath))) {
                    link.classList.add('active');
                }
            });
        })();

        /* =========================================================
           AUTO-DISMISS MESSAGES
           ========================================================= */
        document.querySelectorAll('[style*="background-color: #d4edda"]').forEach(msg => {
            setTimeout(() => {
                msg.style.transition = 'opacity 0.4s ease';
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 400);
            }, 4000);
        });

        /* =========================================================
           TABLE ROW HOVER KEYBOARD NAVIGATION
           ========================================================= */
        document.querySelectorAll('tbody tr').forEach(row => {
            row.setAttribute('tabindex', '0');
        });

        /* =========================================================
           BOTÃO SUBMETER — Feedback visual
           ========================================================= */
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function () {
                const btn = this.querySelector('button[type="submit"]');
                if (btn && !btn.classList.contains('loading')) {
                    btn.classList.add('loading');
                    btn.disabled = true;
                }
            });
        });

        /* =========================================================
           MENU TOGGLE — Esconder no resize
           ========================================================= */
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768 && sidebar.classList.contains('open')) {
                closeSidebar();
            }
        });
    </script>
</body>
</html>
